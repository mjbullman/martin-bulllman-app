# GitHub action to deploy MartinBullmanApp backend.
name: deploy-backend

permissions:
  contents: read
  packages: write

on:
  # trigger workflow on pushes to the main branch or pull requests targeting the main branch.
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: 3.12.2

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      # step 1: checkout the code from the repository.
      - name: Checkout Code
        uses: actions/checkout@v4

      # step2: setup python.
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # step 3: install project dependencies.
      - name: Install Dependencies
        working-directory: ./backend/martinbullman
        run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

      # step 4: run pylint to check for code issues.
      - name: Run Pylint
        working-directory: ./backend
        run: |
          pylint $(git ls-files '*.py')

  test:
    # test job depends on the lint job.
    needs: lint
    runs-on: ubuntu-latest

    steps:
      # step 1: checkout the code from the repository.
      - name: Checkout Code
        uses: actions/checkout@v4

      # step 2: setup python with specific version.
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # step 3: install project dependencies.
      - name: Install Dependencies
        working-directory: ./backend/martinbullman
        run: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt

      # step 4: run tests.
      - name: Run Tests
        working-directory: ./backend/martinbullman
        env:
          API_URL: ${{secrets.API_URL}}

          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

          EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM_ADDRESS: ${{ secrets.EMAIL_FROM_ADDRESS }}
          EMAIL_FROM_NAME: ${{secrets.EMAIL_FROM_NAME}}

          MAILJET_API_KEY: ${{secrets.MAILJET_API_KEY}}
          MAILJET_API_SECRET: ${{secrets.MAILJET_API_SECRET}}

          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}

          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: |
          python manage.py test

  build:
    # build job depends on the test job.
    needs: test
    runs-on: ubuntu-latest

    steps:
      # step 1: checkout the code from the repository.
      - name: Checkout Code
        uses: actions/checkout@v4

      # step 2: log in to github container registry.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # step 3: build and push the backend docker image.
      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/mjbullman/martin-bullman-app/backend:latest
            ghcr.io/mjbullman/martin-bullman-app/backend:${{ github.sha }}

  deploy:
    # deploy job depends on the build job.
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      # step 1: ssh into server, pull latest image, and restart backend.
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/MartinBullmanApp
            git pull origin main
            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d backend
