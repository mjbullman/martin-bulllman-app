# GitHub action to deploy MartinBullmanApp frontend.
name: deploy-frontend

on:
  # trigger workflow on pushes to the main branch or pull requests targeting the main branch.
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # set environment variables for node.js version and github context values.
  NODE_VERSION: 20.10.0
  FILENAME: "${{ github.sha }}-${{ github.run_id }}"
  GITHUB_SHA: ${{ github.sha }}
  GITHUB_REF: ${{ github.ref }}

permissions:
  id-token: write   # required for OIDC
  contents: read    # checkout etc.

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      # step 1: checkout the code from the repository.
      - name: Checkout Code
        uses: actions/checkout@v4

      # step 2: set up Node.js environment.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # step 3: install project dependencies.
      - name: Install Dependencies
        working-directory: ./frontend
        run: |
          rm -rf node_modules package-lock.json
          npm install

      # step 4: run ESLint to lint the code.
      - name: Run Lint
        working-directory: ./frontend
        run: npm run lint

  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      # step 1: checkout the code from the repository.
      - name: Checkout Code
        uses: actions/checkout@v4

      # step 2: set up Node.js environment.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # step 3: install project dependencies.
      - name: Install Dependencies
        working-directory: ./frontend
        run: |
          rm -rf node_modules package-lock.json
          npm install

      # step 4: run ESLint to lint the code.
      - name: Run Tests
        working-directory: ./frontend
        run: npm run test:coverage

      # step 5: run code coverage and upload report
      - name: Upload Report Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: mjbullman/martin-bulllman-app
          files: ./frontend/coverage/coverage-final.json

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      # step 1: checkout the code from the repository.
      - name: Checkout Code
        uses: actions/checkout@v4

      # step 2: install project dependencies.
      - name: Install Dependencies
        working-directory: ./frontend
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Create .env File
        working-directory: ./frontend
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL }}" >> .env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> .env
          echo "CODECOV_TOKEN=${{ secrets.CODECOV_TOKEN }}" >> .env
          echo "MIXPANEL_TOKEN=${{ secrets.MIXPANEL_TOKEN }}" >> .env
          echo "GOOGLE_ANALYTICS_ID=${{ secrets.GOOGLE_ANALYTICS_ID }}" >> .env
          echo "GOOGLE_RECAPTCHA_SITE_KEY=${{ secrets.GOOGLE_RECAPTCHA_SITE_KEY }}" >> .env

      # step 3: build the frontend application.
      - name: Build Application
        working-directory: ./frontend
        run: npm run build

      # step 4: archive the build output into a tarball.
      - name: Archive Artifacts
        working-directory: ./frontend/
        run: tar -czf ../${{ env.FILENAME }}.tar.gz .

      # step 5: upload the archived artifacts for later use in deployment.
      - name: Store Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-artifacts
          path: ${{ env.FILENAME }}.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-1
      INSTANCE_NAME: MartinBullmanAppServer   # change to your instance name

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::540652926412:role/GitHubAction-AssumeRoleWithAction
          role-session-name: DeployFrontend
          aws-region: ${{ env.AWS_REGION }}

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-artifacts

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Lightsail temp credentials
        run: |
          aws lightsail get-instance-access-details \
            --instance-name "$INSTANCE_NAME" \
            --protocol ssh \
            --output json > access.json
  
          jq -r '.accessDetails.privateKey' access.json > tempkey.pem
          chmod 600 tempkey.pem
          echo "USERNAME=$(jq -r '.accessDetails.username' access.json)" >> $GITHUB_ENV
          echo "IP=$(aws lightsail get-instance --instance-name "$INSTANCE_NAME" --query 'instance.publicIpAddress' --output text)" >> $GITHUB_ENV
  
          mkdir -p ~/.ssh
          jq -r '.accessDetails.hostKeys[]?.publicKey' access.json | while read -r key; do
            echo "$IP $key" >> ~/.ssh/known_hosts
          done

      - name: Add Lightsail host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t ed25519 52.31.195.51 >> ~/.ssh/known_hosts

      - name: Copy build to server
        run: |
          scp -i tempkey.pem -o StrictHostKeyChecking=no ${{ env.FILENAME }}.tar.gz \
            $USERNAME@$IP:/home/ubuntu/

      - name: Deploy on server
        run: |
          ssh -i tempkey.pem -o StrictHostKeyChecking=yes $USERNAME@$IP <<'EOF'
            set -e
            mkdir -p frontend_releases/${{ env.FILENAME }}
            tar -xzf ${{ env.FILENAME }}.tar.gz -C frontend_releases/${{ env.FILENAME }}
            cp -r frontend_releases/${{ env.FILENAME }}/* MartinBullmanApp/frontend
            cp -r frontend_releases/${{ env.FILENAME }}/.output MartinBullmanApp/frontend
            rm ${{ env.FILENAME }}.tar.gz
  
            # reload Node and restart app
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            nvm use 20.10.0
            pm2 restart all
          EOF

      - name: Cleanup
        run: rm -f tempkey.pem access.json

