# GitHub action to deploy MartinBullmanApp frontend.
name: deploy-frontend

permissions:
  contents: read
  packages: write

on:
  # trigger workflow on pushes to the main branch or pull requests targeting the main branch.
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: 24.14.0

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      # step 1: checkout the code from the repository.
      - name: Checkout Code
        uses: actions/checkout@v4

      # step 2: set up Node.js environment.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # step 3: install project dependencies.
      - name: Install Dependencies
        working-directory: ./frontend
        run: |
          rm -rf node_modules package-lock.json
          npm install

      # step 4: run ESLint to lint the code.
      - name: Run Lint
        working-directory: ./frontend
        run: npm run lint

  test:
    needs: lint
    runs-on: ubuntu-latest

    steps:
      # step 1: checkout the code from the repository.
      - name: Checkout Code
        uses: actions/checkout@v4

      # step 2: set up Node.js environment.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # step 3: install project dependencies.
      - name: Install Dependencies
        working-directory: ./frontend
        run: |
          rm -rf node_modules package-lock.json
          npm install

      # step 4: run tests with coverage.
      - name: Run Tests
        working-directory: ./frontend
        run: npm run test:coverage

      # step 5: upload coverage report to codecov.
      - name: Upload Report Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: mjbullman/martin-bulllman-app
          files: ./frontend/coverage/coverage-final.json

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      # step 1: checkout the code from the repository.
      - name: Checkout Code
        uses: actions/checkout@v4

      # step 2: log in to github container registry.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # step 3: build and push the frontend docker image.
      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/mjbullman/martin-bullman-app/frontend:latest
            ghcr.io/mjbullman/martin-bullman-app/frontend:${{ github.sha }}
          build-args: |
            BASE_URL=${{ secrets.BASE_URL }}
            API_BASE_URL=${{ secrets.API_BASE_URL }}
            GOOGLE_ANALYTICS_ID=${{ secrets.GOOGLE_ANALYTICS_ID }}
            GOOGLE_RECAPTCHA_SITE_KEY=${{ secrets.GOOGLE_RECAPTCHA_SITE_KEY }}
            MIXPANEL_TOKEN=${{ secrets.MIXPANEL_TOKEN }}
            CODECOV_TOKEN=${{ secrets.CODECOV_TOKEN }}

  deploy:
    # deploy job depends on the build job.
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      # step 1: ssh into server, pull latest image, and restart frontend.
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/MartinBullmanApp
            git pull origin main
            docker compose -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.prod.yml up -d frontend
