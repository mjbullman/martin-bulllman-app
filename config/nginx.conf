server {
    listen 80;
    server_name martinbullman.xyz www.martinbullman.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name martinbullman.xyz www.martinbullman.xyz;

    ssl_certificate     /etc/ssl/martinbullman/server.crt;
    ssl_certificate_key /etc/ssl/martinbullman/server.key;

    server_tokens off;

    # index files.
    index index.html index.htm;

    # gzip config.
    gzip on;
    gzip_types
         application/atom+xml
         application/geo+json
         application/javascript
         application/x-javascript
         application/json
         application/ld+json
         application/manifest+json
         application/rdf+xml
         application/rss+xml
         application/xhtml+xml
         application/xml
         image/svg+xml
         text/css
         text/javascript
         text/plain
         text/xml;
    gzip_proxied    no-cache no-store private expired auth;
    gzip_min_length 1000;

    # use docker's internal dns resolver so upstreams resolve at request time.
    resolver 127.0.0.11 valid=30s;

    # Nuxt static assets — cache forever (filenames are content-hashed)
    location ^~ /_nuxt/ {
        set $frontend http://frontend:3000;
        proxy_pass $frontend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;

        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Django backend API
    location ^~ /api/ {
        set $backend http://backend:8000;
        proxy_pass $backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }

    # Vue frontend
    location / {
        set $frontend http://frontend:3000;
        proxy_pass $frontend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;

        proxy_read_timeout    1800;
        proxy_connect_timeout 1800;
    }
}

